# -----------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------
env:
  name: pendulum

# -----------------------------------------------------------------------
# Policy (actor)
# -----------------------------------------------------------------------
policy:
  type: mlp
  hidden_sizes: [64, 64]         # actor hidden layers
  critic_hidden_sizes: [64, 64]  # critic hidden layers (defaults to hidden_sizes)

# -----------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------
training:
  algo: ppo
  # seed: 0                   # omit to randomise each run
  epochs: 1000                # number of data-collection + update iterations
  horizon: 200               # steps per rollout
  num_env: 16                # parallel environments per rollout

  # Optimiser
  lr: 3.0e-4
  grad_clip: 0.5

  # Discount & GAE
  gamma: 0.99
  gae_lambda: 0.95

  # PPO-specific
  ppo_epochs: 10             # update passes over each collected batch
  n_minibatches: 4           # number of mini-batches per update (N must be divisible)
  clip_eps: 0.2              # PPO clipping epsilon
  vf_coef: 0.5               # value-function loss coefficient
  ent_coef: 0.01             # entropy bonus coefficient
  log_std_init: -0.5         # initial log σ  (σ ≈ 0.61)

  log_interval: 10

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------
logging:
  csv_path: logs/ppo_pendulum.csv
