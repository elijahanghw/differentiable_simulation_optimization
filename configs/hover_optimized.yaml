# -----------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------
env:
  name: hover_3d
  integrator: semi_implicit_euler
  train_morphology: true
  morph_init_scale: 0.0
  alternating_alpha: false

# -----------------------------------------------------------------------
# Policy
# -----------------------------------------------------------------------
# policy:
#   type: mlp
#   squash_output: false
#   hidden_sizes: [64, 64]   # input/output dims are inferred from the env

policy:
  type: gru
  squash_output: false
  encoder_sizes: [64]
  hidden_size: [64]
  head_sizes: [64]

# -----------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------
training:
  # seed: 0
  epochs: 3000
  morph_epochs: 2000
  morphological_loss: true
  morphological_loss_weight: 500.0
  horizon: 200        # rollout length for BPTT (short-horizon APG)
  batch_size: 1024    # number of parallel rollouts per gradient step
  lr: 3.0e-4
  lr_min: 3.0e-4
  morph_lr: 5.0e-3
  morph_lr_min: 1.0e-3
  grad_clip: 1.0     # global gradient norm clip
  # gamma: 0.99        # discount factor
  log_interval: 10   # print/log every N epochs

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------
logging:
  csv_path: logs/gru_morph_optimal_hover_3d_logs_test.csv
  checkpoint_path: checkpoints/gru_morph_optimal_hover_3d_test.pkl
