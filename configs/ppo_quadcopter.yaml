# -----------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------
env:
  name: quad_racing
  initialize_at_random_gate: True
  randomization: 0.3

# -----------------------------------------------------------------------
# Policy (actor)
# -----------------------------------------------------------------------
policy:
  type: mlp
  hidden_sizes: [64, 64, 64]
  critic_hidden_sizes: [64, 64, 64]
  squash_output: false

# -----------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------
training:
  algo: ppo
  # seed: 0
  epochs: 1000               # data-collection + update iterations
  horizon: 1000               # steps per rollout
  num_env: 128             # parallel environments per rollout

  # Optimiser
  lr: 3.0e-4
  grad_clip: 0.5

  # Discount & GAE
  gamma: 0.999
  gae_lambda: 0.95

  # PPO-specific
  ppo_epochs: 10
  n_minibatches: 20
  clip_eps: 0.2
  vf_coef: 0.5
  ent_coef: 0.000            # lower entropy bonus for complex task
  log_std_init: 0.0

  log_interval: 10

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------
logging:
  csv_path: logs/ppo_quadcopter.csv
