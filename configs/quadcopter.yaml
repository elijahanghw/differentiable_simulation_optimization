# -----------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------
env:
  name: quad_racing
  initialize_at_random_gate: True
  randomization: 0.3

# -----------------------------------------------------------------------
# Policy
# -----------------------------------------------------------------------
policy:
  type: mlp
  hidden_sizes: [64, 64, 64]   # input/output dims are inferred from the env

# -----------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------
training:
  # seed: 0
  epochs: 5000
  horizon: 1000        # rollout length for BPTT (short-horizon APG)
  batch_size: 128    # number of parallel rollouts per gradient step
  lr: 3.0e-4
  grad_clip: 1.0     # global gradient norm clip
  gamma: 0.99        # discount factor
  log_interval: 100   # print/log every N epochs

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------
logging:
  csv_path: logs/training.csv
