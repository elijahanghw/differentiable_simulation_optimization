# -----------------------------------------------------------------------
# Environment — DiffPhysDrone-style point-mass navigation
# -----------------------------------------------------------------------
env:
  name: pointmass_navigate

  # Camera (DiffPhysDrone single_agent defaults)
  cam_angle_deg: 10.0    # upward tilt from forward axis
  fov_x_deg: 79.5        # ≈ 2·atan(0.82), matches DiffPhysDrone fov_x_half_tan=0.82

  # Episode speed range (speed_mtp=1 → conservative; multiply for faster)
  max_speed_min: 0.75
  max_speed_max: 2.00

  # Gradient decay for training stability
  grad_decay: 0.7

  # Loss coefficients
  coef_v: 1.0
  coef_v_pred: 2.0
  coef_collide: 7.5
  coef_obj_avoidance: 3.0
  coef_d_acc: 0.01
  coef_d_jerk: 0.001

  # Scene (obstacles)
  scene:
    arena_x_min: 2.0
    arena_x_max: 8.0
    arena_y_min: -3.0
    arena_y_max: 3.0
    arena_z_min: 0.5
    arena_z_max: 4.0
    n_spheres: 15
    n_boxes: 15
    n_capsules: 15
    sphere_r_min: 0.10
    sphere_r_max: 0.40
    box_hx_min: 0.10
    box_hx_max: 0.40
    box_hy_min: 0.10
    box_hy_max: 0.40
    box_hz_min: 0.10
    box_hz_max: 0.40
    capsule_r_min: 0.08
    capsule_r_max: 0.25
    capsule_hh_min: 0.20
    capsule_hh_max: 0.80

# -----------------------------------------------------------------------
# Policy — CNN-GRU matching DiffPhysDrone model.py
# -----------------------------------------------------------------------
policy:
  type: cnn_gru
  squash_output: false      # raw acceleration outputs, no tanh
  conv_features: [32, 64, 128]
  kernel_sizes: [[2, 2], [3, 3], [3, 3]]
  strides: [[2, 2], [1, 1], [1, 1]]
  proj_dim: 192
  leaky_slope: 0.05
  hidden_size: 192

# -----------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------
training:
  epochs: 3000
  horizon: 150              # 10 seconds at 15 Hz
  batch_size: 64
  lr: 1.0e-3
  lr_min: 1.0e-5            # cosine-equivalent end LR (matches DiffPhysDrone)
  grad_clip: 1.0
  # seed: 0
  log_interval: 25

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------
logging:
  csv_path: logs/pointmass_navigate.csv
  checkpoint_path: checkpoints/pointmass_navigate.pkl
