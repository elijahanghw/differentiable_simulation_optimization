# -----------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------
env:
  name: pendulum_force
  # name: pendulum
  # Environment-specific parameters live in envs/pendulum.py.
  # Add keys here only to override defaults, e.g.:
  # max_torque: 3.0
  train_morphology: false

# -----------------------------------------------------------------------
# Policy
# -----------------------------------------------------------------------
policy:
  type: mlp
  hidden_sizes: [64, 64]   # input/output dims are inferred from the env

# -----------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------
training:
  # seed: 0
  epochs: 10000
  horizon: 200        # rollout length for BPTT (short-horizon APG)
  batch_size: 1024    # number of parallel rollouts per gradient step
  lr: 3.0e-4
  morph_lr: 1.0e-3
  grad_clip: 1.0     # global gradient norm clip
  gamma: 0.99        # discount factor
  log_interval: 10   # print/log every N epochs

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------
logging:
  csv_path: logs/training.csv
